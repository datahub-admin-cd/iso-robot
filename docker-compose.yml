services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: iso-robot-api:latest
    container_name: iso-robot-api
    ports:
      - "${API_PORT:-8000}:8000"
    # Optional secrets/config: copy .env.docker.example to .env (or backend/.env).
    env_file:
      - .env
    environment:
      DATABASE_PATH: /app/backend/data/db.sqlite
      DOCUMENTS_DIR: /app/all-docs
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # Set to "true" on first boot to create demo orgs/users (idempotent).
      RUN_SEED_DEMO: ${RUN_SEED_DEMO:-false}
      # Milvus vector DB (per-org knowledge index for the chatbot). The app
      MILVUS_URI: ${MILVUS_URI:-http://milvus-standalone:19530}
      MILVUS_TOKEN: ${MILVUS_TOKEN:-}
    volumes:
      # SQLite DB + per-org upload folders persist here.
      - ./backend/data:/app/backend/data
      # Curated CSV and other repo data (read/write for seed endpoints).
      - ./data:/app/data
      # Optional document scan folder (PDFs/HTML).
      - ./all-docs:/app/all-docs
      # POC workbook for seed-from-poc endpoints (host file overrides image copy).
      - "./ISO ROBOT RISK POC.xlsx:/app/ISO ROBOT RISK POC.xlsx:ro"
    depends_on:
      - milvus-standalone
    restart: unless-stopped

  docs:
    build:
      context: ./mint-docs
      dockerfile: Dockerfile
    image: iso-robot-docs:latest
    container_name: iso-robot-docs
    ports:
      - "${DOCS_PORT:-3005}:3005"
    environment:
      PORT: "3005"
      HOSTNAME: 0.0.0.0
      MINTLIFY_TELEMETRY_DISABLED: "1"
    restart: unless-stopped

  # Milvus Standalone (vector DB)
  # etcd (metadata) + minio (object storage) + milvus = the standard standalone
  # topology from the official Milvus docker-compose.
  etcd:
    container_name: milvus-etcd
    image: quay.io/coreos/etcd:v3.5.18
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  minio:
    container_name: milvus-minio
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  milvus-standalone:
    container_name: milvus-standalone
    image: milvusdb/milvus:v2.5.4
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    depends_on:
      - etcd
      - minio
    restart: unless-stopped

volumes:
  etcd_data:
  minio_data:
  milvus_data:
